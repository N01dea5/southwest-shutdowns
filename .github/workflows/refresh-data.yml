name: Refresh dashboard data

# Keeps data/*.json + data/targets/ + data/imports/ in sync with their sources
# without any manual runs of scripts/sync_source_targets.py or
# scripts/parse_rapidcrews.py.
#
# Triggers:
#   push       — whenever a roster XLSX, target file, import, or script lands
#   schedule   — nightly, picks up changes made overnight on each per-site
#                dashboard (Covalent / Tronox / CSBP) even if nothing was
#                pushed to this repo.
#   manual     — "Run workflow" button on the Actions tab.
#
# Outcome: the action runs both scripts and commits any regenerated files
# back to the same branch with a "[skip ci]" message so the commit itself
# doesn't re-trigger the workflow.

on:
  push:
    branches: [main]              # main only — pushes to the default branch are mirrored by us
    paths:
      - 'data/raw/**'                # includes Rapidcrews Macro Data.xlsx
      - 'data/targets/**'
      - 'data/imports/**'
      - 'scripts/**'
      - 'Resumes.xlsx'               # resumes consolidation (SharePoint-owned)
  workflow_dispatch:
  # NOTE: nightly schedule disabled until SharePoint pull is wired up.
  # Re-enable by uncommenting the schedule block below.
  # schedule:
  #   - cron: '0 22 * * *'        # 22:00 UTC ≈ 06:00 AWST

concurrency:
  # One refresh at a time per branch; queue rather than cancel so manual
  # dispatches and pushes don't stomp on each other.
  group: refresh-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so git push doesn't reject fast-forwards.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # Note: no `cache: pip` — would require a requirements.txt file to
          # hash against. openpyxl + urllib are the only deps; install is
          # quick enough that pip-cache savings aren't worth the constraint.

      - name: Install dependencies
        run: pip install openpyxl

      - name: Pull new rosters from SharePoint
        # No-ops when the five SHAREPOINT_* secrets aren't configured —
        # only pulls when the drop-zone is wired up.
        env:
          SHAREPOINT_TENANT_ID:     ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID:     ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE:          ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_FOLDER:        ${{ secrets.SHAREPOINT_FOLDER }}
        run: python3 scripts/sync_sharepoint.py

      # Rapid Crews is now the source of truth for required/filled/roles —
      # sync_source_targets.py is kept for manual overrides but no longer
      # runs automatically, so the per-site dashboards can't race the macro
      # workbook. Re-enable the step below only if you need to snapshot a
      # site dashboard's count into data/targets/ as a deliberate override.
      # - name: Sync targets + fill counts from per-site dashboards
      #   run: python3 scripts/sync_source_targets.py

      - name: Parse Rapid Crews rosters, archive history, emit resumes
        run: python3 scripts/parse_rapidcrews.py

      - name: Detect data changes
        id: diff
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes this run."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --cached --stat
          fi

      - name: Bump dashboard cache-buster
        if: steps.diff.outputs.changed == 'true'
        run: |
          ts=$(date -u +%Y%m%d-%H%M)
          # Update every ?v=<something> query-string so iOS Safari picks up
          # the rebuilt payload immediately after GH Pages redeploys.
          sed -i -E "s|\?v=[A-Za-z0-9._-]+|?v=${ts}|g" index.html
          git add index.html
          echo "Cache-buster bumped to v=${ts}"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "srg-dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git commit -m "Auto-refresh dashboard data [skip ci]

          Regenerated by .github/workflows/refresh-data.yml
          (sync_source_targets.py -> parse_rapidcrews.py)"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Dashboard refresh"
            echo ""
            if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "✓ Changes committed and pushed."
            else
              echo "– No data changes this run."
            fi
            echo ""
            echo "Site dashboards polled:"
            echo "- N01dea5/Covalent-Mt-Holland---April-2026"
            echo "- N01dea5/tronox-major-shutdown-may-2026"
            echo "- N01dea5/csbp-naan2-shutdown-workforce-dashboard"
          } >> "$GITHUB_STEP_SUMMARY"
