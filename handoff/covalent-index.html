    /* -------------------------------------------------------------------
       Data feed integration — fetches the SQL-sourced roster + tickets
       from the southwest-shutdowns repo on load, then hands control to
       the existing App(). Added 2026-04 to replace the hand-maintained
       E + ROSTER constants with a live view of the Rapid Crews scheduler.
       ------------------------------------------------------------------- */

    const DATA_URL = "https://raw.githubusercontent.com/N01dea5/southwest-shutdowns/main/data/covalent.json";

    // Covalent's dashboard groups rows into a small set of trade categories
    // (Leadership / HSE / Boilermaker / Electrical / Fitter / Inspections /
    // Rigger / Roller Crew / Lube Tech / Trade Assistant). The upstream JSON
    // uses the Rapid Crews role vocabulary — map each RC role onto Covalent's
    // local category so the By-Trade Summary / Ranking / Risk views keep
    // working. Unknown roles fall back to "Trade Assistant".
    const ROLE_TO_GROUP = {
      "Superintendent":          "Leadership",
      "Site Coordinator":        "Leadership",
      "Supervisor":              "Leadership",
      "Supervisor - Mechanical": "Leadership",
      "Supervisor - Electrical": "Leadership",
      "HSE Advisor":             "HSE",
      "Boilermaker":             "Boilermaker",
      "Coded Welder":            "Boilermaker",
      "Electrician":             "Electrical",
      "Mechanical Fitter":       "Fitter",
      "Advanced Rigger":         "Rigger",
      "Intermediate Rigger":     "Rigger",
      "Basic Rigger":            "Roller Crew",
      "Lube Technician":         "Lube Tech",
      "Trade Assistant":         "Trade Assistant",
      "Telehandler Operator":    "Trade Assistant",
    };

    function buildFromJson(data) {
      const sd = (data.shutdowns || [])[0];
      if (!sd) throw new Error("No shutdowns in data feed");

      const required  = sd.required_by_role || {};
      const rosterRaw = sd.roster || [];

      // Build DATES / DOW columns from the shutdown window.
      DATES = [];
      DOW   = [];
      const start = new Date(sd.start_date + "T00:00:00");
      const end   = new Date(sd.end_date   + "T00:00:00");
      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dowNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        DATES.push(String(d.getDate()).padStart(2, "0") + " " + monthNames[d.getMonth()]);
        DOW.push(dowNames[d.getDay()]);
      }

      // Build CREW = named roster + TBC padding to hit required_by_role.
      const filledByRoleShift = {};
      for (const r of rosterRaw) {
        const role  = r.role;
        const shift = r.shift || "Day";
        filledByRoleShift[role] = filledByRoleShift[role] || { Day: 0, Night: 0 };
        filledByRoleShift[role][shift === "Night" ? "Night" : "Day"]++;
      }
      const ORDER = Object.keys(required).sort((a, b) => required[b] - required[a]);
      const CREW = [];
      for (const role of ORDER) {
        const req  = required[role] || 0;
        const have = rosterRaw.filter(x => x.role === role);
        for (const r of have) CREW.push(r);
        const gap = req - have.length;
        if (gap <= 0) continue;
        const split = filledByRoleShift[role] || { Day: 0, Night: 0 };
        let dayDebt = Math.max(0, Math.ceil(req / 2) - split.Day);
        for (let i = 0; i < gap; i++) {
          const shift = dayDebt > 0 ? "Day" : "Night";
          if (shift === "Day") dayDebt--;
          CREW.push({ name: "TBC", role, shift, tickets: {} });
        }
      }

      const ticketKeys = ["cse","wah","ewp","ba","fork","hr","dog","gta","fa"];
      E = CREW.map((r, i) => {
        const t = r.tickets || {};
        const isTBC = r.name === "TBC";
        const ticketCount = ticketKeys.filter(k => !!t[k]).length + (t.rig ? 1 : 0);
        const hasAnyExp = ticketKeys.some(k => t[k] && t[k].status === "expiring_soon")
                       || (t.rig && t.rig.status === "expiring_soon");
        const roleLower = r.role ? r.role.toLowerCase() : "position";
        const sum = isTBC
          ? `Unfilled ${r.role} position — ${r.shift || "shift TBC"}. Source personnel and confirm ticket compliance before mobilisation.`
          : ticketCount > 0
            ? `${r.shift || ""} shift ${roleLower} — ${ticketCount} current ticket${ticketCount === 1 ? "" : "s"} in Rapid Crews compliance.${hasAnyExp ? " Ticket(s) expiring within 30 days — review before mobilisation." : ""}`
            : `${r.shift || ""} shift ${roleLower} — ticket details awaiting compliance entry.`;
        return {
          id:    i + 1,
          name:  r.name,
          role:  r.role,
          shift: r.shift || "Day",
          days:  DATES.length || 18,
          group: ROLE_TO_GROUP[r.role] || "Trade Assistant",
          // Trade-years / shutdown-years are no longer tracked; the resume
          // data field is replaced by live compliance ticket coverage.
          ty: 0, sy: 0,
          cse:  !!t.cse,
          wah:  !!t.wah,
          ewp:  !!t.ewp,
          ba:   !!t.ba,
          fork: !!t.fork,
          hr:   !!t.hr,
          dog:  !!t.dog,
          rig:  (t.rig && t.rig.level) || "",
          gta:  !!t.gta,
          fa:   !!t.fa,
          // Telehandler: reuse forklift flag (no separate WA competency).
          tele: !!t.fork,
          mobile: r.mobile || "",
          personnel_id: r.personnel_id || null,
          _tickets: t,
          _ticketCount: ticketCount,
          sum,
        };
      });

      // Stable sort: group (per GROUP_ORDER), Day before Night, named before TBC, alpha.
      const groupRank = {};
      (window.__COVALENT_GROUP_ORDER__ || GROUP_ORDER).forEach((g, i) => { groupRank[g] = i; });
      E.sort((a, b) => {
        const ga = groupRank[a.group] ?? 99;
        const gb = groupRank[b.group] ?? 99;
        if (ga !== gb) return ga - gb;
        if (a.shift !== b.shift) return a.shift === "Day" ? -1 : 1;
        const aT = a.name === "TBC";
        const bT = b.name === "TBC";
        if (aT !== bT) return aT ? 1 : -1;
        return a.name.localeCompare(b.name);
      });
      E.forEach((e, i) => { e.id = i + 1; });

      // ROSTER: shift-code grid (named only; TBC left off so grid stays scannable).
      ROSTER = E.filter(e => e.name !== "TBC").map(e => ({
        name:  e.name,
        role:  e.role,
        notes: `${e.shift} shift · ${DATES.length} days`,
        codes: (e.shift === "Night"
                 ? new Array(DATES.length).fill("NS")
                 : new Array(DATES.length).fill("DS")),
      }));

      // Stash meta for the header/freshness banner.
      window.__COVALENT_META__ = {
        name:         sd.name || "",
        site:         sd.site || "",
        start_date:   sd.start_date,
        end_date:     sd.end_date,
        generated_at: data.generated_at || null,
      };
    }

    function renderStatus(kind, message, detail) {
      const root = document.getElementById("root");
      const color  = kind === "error" ? "#900" : SRG_GREY;
      const border = kind === "error" ? "#C00" : SRG_BORDER;
      const bg     = kind === "error" ? "#FEF2F2" : "white";
      root.innerHTML =
        '<div style="max-width:520px;margin:80px auto;padding:32px;font-family:Source Sans 3,Segoe UI,system-ui,sans-serif;' +
           'background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';box-shadow:0 1px 3px rgba(0,0,0,.05);">' +
          '<div style="font-size:11px;font-weight:700;color:' + SRG_RED + ';letter-spacing:1.5px;text-transform:uppercase;">Covalent Mt Holland Dashboard</div>' +
          '<div style="font-size:18px;font-weight:700;margin-top:8px;color:' + SRG_DARK + ';">' + message + '</div>' +
          (detail ? '<div style="font-size:12px;color:#888;margin-top:10px;font-family:monospace;">' + detail + '</div>' : '') +
          (kind === "error" ? '<div style="font-size:12px;color:#666;margin-top:16px;">Try reloading. If the problem persists, the data feed (southwest-shutdowns) may be offline — contact Asset Services.</div>' : '') +
        '</div>';
    }

    (async function boot() {
      renderStatus("loading", "Loading workforce data…");
      let data;
      try {
        const resp = await fetch(DATA_URL, { cache: "no-cache" });
        if (!resp.ok) throw new Error("HTTP " + resp.status + " from " + DATA_URL);
        data = await resp.json();
      } catch (err) {
        renderStatus("error", "Failed to load data feed", String(err && err.message || err));
        return;
      }
      try {
        buildFromJson(data);
      } catch (err) {
        renderStatus("error", "Data feed format error", String(err && err.message || err));
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    })();
  </script>
</body>
</html>
