name: Refresh dashboard data

# Regenerates the public dashboard data from source workbooks/data already
# pushed into this repository by Power Automate. GitHub Pages serves main / root.
#
# Scheduled runs avoid firing on every workbook push, reducing overlap while
# still keeping the dashboard refreshed automatically. Manual runs can also be
# used when an immediate refresh is required.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'          # Hourly

concurrency:
  group: refresh-data-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      # Power Automate already pushes refreshed workbook/data files into GitHub.
      # Only pull directly from SharePoint when this workflow is run manually.
      - name: Pull new rosters from SharePoint
        if: github.event_name == 'workflow_dispatch'
        env:
          SHAREPOINT_TENANT_ID:     ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID:     ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE:          ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_FOLDER:        ${{ secrets.SHAREPOINT_FOLDER }}
        run: python3 scripts/sync_sharepoint.py

      - name: Build and validate dashboard data
        run: python3 scripts/build_dashboard_data.py

      - name: Detect data changes
        id: diff
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes this run."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --cached --stat
          fi

      - name: Bump dashboard cache-buster
        if: steps.diff.outputs.changed == 'true'
        run: |
          ts=$(date -u +%Y%m%d-%H%M)
          sed -i -E "s|\?v=[A-Za-z0-9._-]+|?v=${ts}|g" index.html
          git add index.html
          echo "Cache-buster bumped to v=${ts}"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "srg-dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git commit -m "Auto-refresh dashboard data

          Regenerated by .github/workflows/refresh-data.yml"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Dashboard refresh"
            echo ""
            if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "✓ Changes committed and pushed."
            else
              echo "– No data changes this run."
            fi
            echo ""
            echo "Inputs refreshed:"
            echo "- data/raw/Rapidcrews Macro Data.xlsx"
            echo "- Resumes.xlsx"
            echo ""
            echo "Build entrypoint: scripts/build_dashboard_data.py"
          } >> "$GITHUB_STEP_SUMMARY"
