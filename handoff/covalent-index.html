      const unwrap = (v) => {
        if (v === null || v === undefined) return "";
        if (typeof v === "object") return v.Value || v.DisplayName || v.value || "";
        return v;
      };

      const normalizeStatus = (s) => {
        const raw = unwrap(s);
        if (!raw) return "not-started";
        const str = String(raw);
        const map = {
          "Not Started": "not-started", "not started": "not-started",
          "In Progress": "in-progress", "in progress": "in-progress",
          "Blocked": "blocked",
          "Delayed": "delayed",
          "Complete": "complete", "Completed": "complete"
        };
        return map[str] || str.toLowerCase().replace(/\s+/g, "-");
      };

      const syncFromSharePoint = () => {
        setSyncState({ status: "syncing", lastSync: syncState.lastSync, error: null });
        fetch(SHAREPOINT_JSON_URL + "?t=" + Date.now())
          .then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(data => {
            const items = Array.isArray(data) ? data : (data.tasks || data.value || []);
            const next = {};
            items.forEach(item => {
              const id = unwrap(item.id || item.Title || item.title);
              if (!id) return;
              const src = item.state || item;
              next[id] = {
                status: normalizeStatus(src.status || src.Status),
                percent: parseInt(unwrap(src.percent || src.PercentComplete || src["Percent Complete"]) || 0, 10),
                notes: unwrap(src.notes || src.Notes) || "",
                delayReason: unwrap(src.delayReason || src.DelayReason || src["Delay Reason"]) || "",
                updatedBy: unwrap(src.updatedBy || src.UpdatedBy || src["Updated By"] || src.Editor) || "",
                actualHours: unwrap(src.actualHours || src.ActualHours || src["Actual Hours"]) || "",
                actualStart: unwrap(src.actualStart || src.ActualStart || src["Actual Start"]) || "",
                actualFinish: unwrap(src.actualFinish || src.ActualFinish || src["Actual Finish"]) || "",
                pictureUrl: unwrap(src.pictureUrl || src.Picture) || "",
                assignedWorkers: src.assignedWorkers || [],
                lastUpdated: unwrap(src.lastUpdated || src.Modified) || new Date().toISOString()
              };
            });
            setTaskStatus(next);
            try { localStorage.setItem("srg_gantt_status", JSON.stringify(next)); } catch {}
            setSyncState({ status: "ok", lastSync: new Date().toISOString(), error: null });
          })
          .catch(err => {
            setSyncState({ status: "error", lastSync: syncState.lastSync, error: err.message });
          });

      const filtered = useMemo(() => E.filter(e => {

              borderTop: `1px solid ${SRG_BORDER}`,
              display: "flex",
              justifyContent: "space-between",
              fontSize: 10,
              color: "#B0B0B0",
              textTransform: "uppercase",
              letterSpacing: 0.5,
              flexWrap: "wrap",
              gap: 8
            }
          },
            React.createElement("span", null, "SRG Global Integrated Services Pty Ltd · ABN 86 604 010 639"),
            React.createElement("span", null, `Generated ${new Date().toLocaleDateString("en-AU")} · Covalent Lithium Shutdown Apr–May 2026`)
          )
        )
      );
    }

    /* -------------------------------------------------------------------
       Data feed integration — fetches the live roster + current ticket
       compliance from southwest-shutdowns on load, then name-matches each
       worker against RESUME_DB (above) to layer on the curated resume
       intel the SQL compliance sheet doesn't carry.

       Priority of fields on each final E[] record:
         - role / shift / days / group   : live feed wins (shutdown planner)
         - cse / wah / ewp / ba / fork
           / hr / dog / rig / gta / fa   : SQL compliance wins (authoritative)
         - ty / sy / sum                 : RESUME_DB wins when matched
                                           (resume narrative + trade years)
         - mobile                        : live feed if present, else RESUME_DB
       ------------------------------------------------------------------- */

    const DATA_URL = "https://raw.githubusercontent.com/N01dea5/southwest-shutdowns/main/data/covalent.json";

    // RC role vocabulary -> Covalent's local category taxonomy. The
    // dashboard's By-Trade tables, charts and rankings all pivot on
    // `group`, so this map is what keeps those views populated.
    const ROLE_TO_GROUP = {
      "Superintendent":          "Leadership",
      "Site Coordinator":        "Leadership",
      "Supervisor":              "Leadership",
      "Supervisor - Mechanical": "Leadership",
      "Supervisor - Electrical": "Leadership",
      "HSE Advisor":             "HSE",
      "Boilermaker":             "Boilermaker",
      "Coded Welder":            "Boilermaker",
      "Electrician":             "Electrical",
      "Mechanical Fitter":       "Fitter",
      "Advanced Rigger":         "Rigger",
      "Intermediate Rigger":     "Rigger",
      "Basic Rigger":            "Roller Crew",
      "Lube Technician":         "Lube Tech",
      "Trade Assistant":         "Trade Assistant",
      "Telehandler Operator":    "Trade Assistant",
    };

    // Aggressive-but-forgiving name normaliser for the resume lookup.
    // Case-insensitive, strips whitespace / hyphens / apostrophes / middle
    // names ("Lucrecia Celeste SOSA" and "Lucrecia Sosa" collide).
    function __normName(s) {
      return (s || "").toLowerCase().replace(/[^a-z]+/g, "");
    }
    function __firstLast(s) {
      const parts = (s || "").trim().split(/\s+/);
      return parts.length
        ? __normName(parts[0]) + __normName(parts[parts.length - 1])
        : "";
    }

    function buildFromJson(data) {
      const sd = (data.shutdowns || [])[0];
      if (!sd) throw new Error("No shutdowns in data feed");

      const required  = sd.required_by_role || {};
      const rosterRaw = sd.roster || [];

      // ---- Date columns ------------------------------------------------
      DATES = [];
      DOW   = [];
      const start = new Date(sd.start_date + "T00:00:00");
      const end   = new Date(sd.end_date   + "T00:00:00");
      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dowNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        DATES.push(String(d.getDate()).padStart(2, "0") + " " + monthNames[d.getMonth()]);
        DOW.push(dowNames[d.getDay()]);
      }

      // ---- Build resume lookup on multiple keys so near-matches still hit
      const resumeByKey = new Map();
      for (const r of RESUME_DB) {
        const full = __normName(r.name);
        const fl   = __firstLast(r.name);
        if (full && !resumeByKey.has(full)) resumeByKey.set(full, r);
        if (fl   && !resumeByKey.has(fl))   resumeByKey.set(fl, r);
      }
      function lookupResume(name) {
        const full = __normName(name);
        if (resumeByKey.has(full)) return resumeByKey.get(full);
        const fl = __firstLast(name);
        if (resumeByKey.has(fl)) return resumeByKey.get(fl);
        return null;
      }

      // ---- Merge each rostered worker with their resume + tickets -----
      const ticketKeys = ["cse","wah","ewp","ba","fork","hr","dog","gta","fa"];
      const merged = [];
      let matched = 0, unmatched = 0;

      for (const r of rosterRaw) {
        const t       = r.tickets || {};
        const resume  = lookupResume(r.name);
        if (resume) matched++; else unmatched++;
        const tCount  = ticketKeys.filter(k => !!t[k]).length + (t.rig ? 1 : 0);
        const hasExp  = ticketKeys.some(k => t[k] && t[k].status === "expiring_soon")
                     || (t.rig && t.rig.status === "expiring_soon");
        const roleLc  = (r.role || "position").toLowerCase();
        const shift   = r.shift || "Day";
        // Start from the resume (rich fields); selectively override with
        // live-feed + compliance truth.
        const base = resume ? Object.assign({}, resume) : {
          ty: 0, sy: 0, sum: `${shift} shift ${roleLc} — resume pending. Tickets live from Rapid Crews compliance.`
        };
        merged.push(Object.assign({}, base, {
          id:    merged.length + 1,
          name:  r.name,                                  // live feed wins
          role:  r.role,                                  // live feed wins
          shift: shift,                                   // live feed wins
          days:  DATES.length || base.days || 10,
          group: ROLE_TO_GROUP[r.role] || (base.group || "Trade Assistant"),
          // SQL compliance wins for the ticket booleans — these are
          // recomputed every run from the workbook's PersonnelCompetency sheet.
          cse:  !!t.cse,
          wah:  !!t.wah,
          ewp:  !!t.ewp,
          ba:   !!t.ba,
          fork: !!t.fork,
          hr:   !!t.hr,
          dog:  !!t.dog,
          rig:  (t.rig && t.rig.level) || "",
          gta:  !!t.gta,
          fa:   !!t.fa,
          tele: !!t.fork,                                 // WA: telehandler via forklift ticket
          mobile: r.mobile || (resume && resume.mobile) || "",
          personnel_id: r.personnel_id || null,
          _tickets:      t,
          _ticketCount:  tCount,
          _resumeMatched: !!resume,
          _expiringSoon:  hasExp,
        }));
      }

      // ---- TBC padding: per-role shortfall against required_by_role ----
      const filledByRoleShift = {};
      for (const r of rosterRaw) {
        filledByRoleShift[r.role] = filledByRoleShift[r.role] || { Day: 0, Night: 0 };
        filledByRoleShift[r.role][r.shift === "Night" ? "Night" : "Day"]++;
      }
      for (const role of Object.keys(required)) {
        const req  = required[role] || 0;
        const have = rosterRaw.filter(x => x.role === role).length;
        const gap  = req - have;
        if (gap <= 0) continue;
        const split = filledByRoleShift[role] || { Day: 0, Night: 0 };
        let dayDebt = Math.max(0, Math.ceil(req / 2) - split.Day);
        for (let i = 0; i < gap; i++) {
          const shift = dayDebt > 0 ? "Day" : "Night";
          if (shift === "Day") dayDebt--;
          merged.push({
            id: merged.length + 1,
            name: "TBC", role, shift,
            days: DATES.length || 10,
            group: ROLE_TO_GROUP[role] || "Trade Assistant",
            ty: 0, sy: 0,
            cse:false, wah:false, ewp:false, ba:false, fork:false, hr:false,
            dog:false, rig:"", gta:false, fa:false, tele:false,
            mobile: "", personnel_id: null,
            _tickets: {}, _ticketCount: 0, _resumeMatched: false, _expiringSoon: false,
            sum: `Unfilled ${role} — ${shift} shift. Source personnel and confirm ticket compliance before mobilisation.`,
          });
        }
      }

      // ---- Stable sort for display -------------------------------------
      const groupRank = {};
      GROUP_ORDER.forEach((g, i) => { groupRank[g] = i; });
      merged.sort((a, b) => {
        const ga = groupRank[a.group] ?? 99;
        const gb = groupRank[b.group] ?? 99;
        if (ga !== gb) return ga - gb;
        if (a.shift !== b.shift) return a.shift === "Day" ? -1 : 1;
        const aT = a.name === "TBC";
        const bT = b.name === "TBC";
        if (aT !== bT) return aT ? 1 : -1;
        return a.name.localeCompare(b.name);
      });
      merged.forEach((e, i) => { e.id = i + 1; });

      E = merged;

      // ROSTER: shift-code grid (named only; TBC left off to keep it scannable).
      ROSTER = E.filter(e => e.name !== "TBC").map(e => ({
        name: e.name, role: e.role,
        notes: `${e.shift} shift · ${DATES.length} days`,
        codes: (e.shift === "Night"
                 ? new Array(DATES.length).fill("NS")
                 : new Array(DATES.length).fill("DS")),
      }));

      window.__COVALENT_META__ = {
        name:         sd.name || "",
        site:         sd.site || "",
        start_date:   sd.start_date,
        end_date:     sd.end_date,
        generated_at: data.generated_at || null,
        resume_match: { matched, unmatched, resume_db_size: RESUME_DB.length },
      };

      if (console && console.info) {
        console.info("[covalent] roster=%d (named=%d tbc=%d), resume match %d/%d, tickets=%d, expiring soon=%d",
          E.length,
          E.filter(e => e.name !== "TBC").length,
          E.filter(e => e.name === "TBC").length,
          matched, matched + unmatched,
          E.reduce((s, e) => s + (e._ticketCount || 0), 0),
          E.filter(e => e._expiringSoon).length);
      }
    }

    function renderStatus(kind, message, detail) {
      const root = document.getElementById("root");
      const color  = kind === "error" ? "#900" : SRG_GREY;
      const border = kind === "error" ? "#C00" : SRG_BORDER;
      const bg     = kind === "error" ? "#FEF2F2" : "white";
      root.innerHTML =
        '<div style="max-width:520px;margin:80px auto;padding:32px;font-family:Source Sans 3,Segoe UI,system-ui,sans-serif;' +
           'background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';box-shadow:0 1px 3px rgba(0,0,0,.05);">' +
          '<div style="font-size:11px;font-weight:700;color:' + SRG_RED + ';letter-spacing:1.5px;text-transform:uppercase;">Covalent Mt Holland Dashboard</div>' +
          '<div style="font-size:18px;font-weight:700;margin-top:8px;color:' + SRG_DARK + ';">' + message + '</div>' +
          (detail ? '<div style="font-size:12px;color:#888;margin-top:10px;font-family:monospace;">' + detail + '</div>' : '') +
          (kind === "error" ? '<div style="font-size:12px;color:#666;margin-top:16px;">Try reloading. If the problem persists, the data feed (southwest-shutdowns) may be offline — contact Asset Services.</div>' : '') +
        '</div>';
    }

    (async function boot() {
      renderStatus("loading", "Loading workforce data…");
      let data;
      try {
        const resp = await fetch(DATA_URL, { cache: "no-cache" });
        if (!resp.ok) throw new Error("HTTP " + resp.status + " from " + DATA_URL);
        data = await resp.json();
      } catch (err) {
        renderStatus("error", "Failed to load data feed", String(err && err.message || err));
        return;
      }
      try {
        buildFromJson(data);
      } catch (err) {
        renderStatus("error", "Data feed format error", String(err && err.message || err));
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    })();
  </script>
</body>
